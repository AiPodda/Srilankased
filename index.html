<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Master SL | සජීවී ඉන්ධන තොරතුරු පද්ධතිය</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans Sinhala', sans-serif; 
            background: #0f172a;
            color: white;
            background-image: radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.2) 0, transparent 50%);
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-available { border-left: 5px solid #22c55e; }
        .status-limited { border-left: 5px solid #eab308; }
        .status-out { border-left: 5px solid #ef4444; }

        .pulse-btn { animation: pulse-shadow 2s infinite; }
        @keyframes pulse-shadow {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="max-w-2xl mx-auto pt-8 px-4 text-center animate__animated animate__fadeInDown">
        <div class="flex justify-center mb-4">
            <div class="bg-yellow-500 text-black p-3 rounded-2xl rotate-3 shadow-xl">
                <i class="fa-solid fa-gas-pump text-2xl"></i>
            </div>
        </div>
        <h1 class="text-4xl font-extrabold text-white">Fuel<span class="text-yellow-500">Master</span>.sl</h1>
        <p class="text-gray-400 text-sm mt-2">ශ්‍රී ලංකාවේ සියලුම පිරවුම්හල්වල සජීවී තොරතුරු</p>
    </header>

    <div class="max-w-2xl mx-auto px-4 mt-8 sticky top-4 z-50">
        <div class="glass p-2 rounded-3xl shadow-2xl">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>
                <input type="text" id="searchInput" onkeyup="filterStations()" placeholder="නගරය හෝ සෙඩ් එකේ නම..." 
                class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-900/50 border-none focus:ring-2 focus:ring-yellow-500 transition-all text-white">
            </div>
            
            <div class="flex gap-2 mt-2 overflow-x-auto no-scrollbar p-1">
                <button onclick="filterByType('92')" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold hover:bg-yellow-600 transition">92 Octane</button>
                <button onclick="filterByType('95')" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold hover:bg-yellow-600 transition">95 Octane</button>
                <button onclick="filterByType('Diesel')" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold hover:bg-yellow-600 transition">Diesel</button>
                <button onclick="resetFilter()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition">Reset</button>
            </div>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4 mt-8 space-y-6" id="stationContainer">
        </main>

    <div class="max-w-2xl mx-auto mt-12 text-center text-gray-500 px-8 mb-10">
        <p class="text-xs leading-relaxed uppercase tracking-widest">
            <i class="fa-solid fa-shield-check text-blue-500 mr-1"></i> Data Verified via Crowdsourcing - Ai Podda Engine
        </p>
    </div>

    <script>
        // ලංකාවේ ප්‍රධාන සෙඩ් දත්ත (Database)
        const stationData = [
            { id: 1, name: "Ceypetco - Town Hall", city: "Colombo", address: "Ward Place, Colombo 07", fuel: "92", status: "Available", queue: "Medium", distance: "2.1 km", contact: "0112694111" },
            { id: 2, name: "LIOC - Maradana", city: "Colombo", address: "Maradana Rd, Colombo 10", fuel: "95", status: "Limited", queue: "Heavy", distance: "1.5 km", contact: "0112435555" },
            { id: 3, name: "Shell - Bambalapitiya", city: "Colombo", address: "Galle Rd, Colombo 04", fuel: "Diesel", status: "Available", queue: "Light", distance: "3.8 km", contact: "0112581234" },
            { id: 4, name: "Ceypetco - Kandy City", city: "Kandy", address: "Peradeniya Rd, Kandy", fuel: "92", status: "Out of Stock", queue: "No Queue", distance: "0.5 km", contact: "0812233444" },
            { id: 5, name: "LIOC - Peradeniya", city: "Kandy", address: "Peradeniya, Kandy", fuel: "Diesel", status: "Available", queue: "Heavy", distance: "4.2 km", contact: "0812388888" },
            { id: 6, name: "Ceypetco - Galle Face", city: "Colombo", address: "Galle Face, Colombo 03", fuel: "92", status: "Available", queue: "Medium", distance: "1.2 km", contact: "0112322322" },
            { id: 7, name: "LIOC - Negombo Town", city: "Negombo", address: "Main St, Negombo", fuel: "95", status: "Available", queue: "Light", distance: "2.0 km", contact: "0312223333" }
        ];

        function loadStations(data) {
            const container = document.getElementById('stationContainer');
            container.innerHTML = '';

            data.forEach(station => {
                const statusClass = station.status === 'Available' ? 'status-available' : (station.status === 'Limited' ? 'status-limited' : 'status-out');
                const statusColor = station.status === 'Available' ? 'text-green-400' : (station.status === 'Limited' ? 'text-yellow-400' : 'text-red-400');

                const card = `
                    <div class="glass rounded-3xl p-6 animate__animated animate__fadeInUp ${statusClass} relative overflow-hidden station-card" data-city="${station.city}" data-fuel="${station.fuel}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold">${station.name}</h3>
                                <p class="text-gray-500 text-xs mt-1">${station.address}</p>
                            </div>
                            <div class="text-[10px] bg-white/10 px-2 py-1 rounded-lg uppercase tracking-wider font-bold">Live</div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mt-4">
                            <div class="bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                                <p class="text-[10px] text-gray-500 uppercase">ඉන්ධන වර්ගය</p>
                                <p class="text-sm font-bold text-yellow-500">${station.fuel} Octane</p>
                            </div>
                            <div class="bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                                <p class="text-[10px] text-gray-500 uppercase">තත්ත්වය</p>
                                <p class="text-sm font-bold ${statusColor}">${station.status}</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 mt-5 text-xs text-gray-400">
                            <span><i class="fa-solid fa-users-line mr-1 text-yellow-500"></i> පෝලිම: <b>${station.queue}</b></span>
                            <span><i class="fa-solid fa-route mr-1 text-blue-400"></i> <b>${station.distance}</b></span>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mt-6">
                            <button onclick="window.open('https://www.google.com/maps/search/${station.name}')" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-2xl transition-all shadow-lg active:scale-95">
                                <i class="fa-solid fa-location-arrow mr-2"></i>Navigation
                            </button>
                            <a href="tel:${station.contact}" class="bg-slate-700 hover:bg-slate-600 text-center font-bold py-3 rounded-2xl transition active:scale-95">
                                <i class="fa-solid fa-phone mr-2"></i>Call
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Search Function
        function filterStations() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const filtered = stationData.filter(s => s.name.toLowerCase().includes(input) || s.city.toLowerCase().includes(input));
            loadStations(filtered);
        }

        // Filter by Fuel Type
        function filterByType(type) {
            const filtered = stationData.filter(s => s.fuel === type);
            loadStations(filtered);
        }

        function resetFilter() {
            loadStations(stationData);
        }

        // Initial Load
        window.onload = () => loadStations(stationData);
    </script>

</body>
</html>
;
