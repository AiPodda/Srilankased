<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelWise SL | ශ්‍රී ලංකාවේ සියලුම ඉන්ධන පිරවුම්හල් පද්ධතිය</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', 'Noto Sans Sinhala', sans-serif; background-color: #f8fafc; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .station-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .station-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        #map { height: 500px; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar">

    <header class="glass-morphism sticky top-0 z-[1000] border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-red-600 to-orange-500 p-3 rounded-2xl shadow-lg shadow-red-200">
                    <i data-lucide="fuel" class="w-7 h-7 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tighter">FuelWise <span class="text-red-600">SL</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none">Complete Station Database 🇱🇰</p>
                </div>
            </div>

            <div class="relative w-full md:w-96">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="globalSearch" placeholder="සෙඩ් එකේ නම, නගරය හෝ දුරකථනය..." 
                       class="w-full pl-12 pr-4 py-3 rounded-2xl border-none bg-slate-100 focus:ring-2 focus:ring-red-500 transition outline-none text-sm">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <section class="mb-12">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                    <i data-lucide="map" class="text-red-600"></i> පිරවුම්හල් සිතියම
                </h2>
                <span class="text-xs font-bold text-slate-400">LIVE GPS ENABLED</span>
            </div>
            <div id="map"></div>
        </section>

        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">දිස්ත්‍රික්කය තෝරන්න</label>
                <select id="districtFilter" class="w-full bg-transparent font-bold text-slate-700 outline-none cursor-pointer">
                    <option value="">සියලුම දිස්ත්‍රික්ක (25)</option>
                </select>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">ඉන්ධන සමාගම</label>
                <select id="companyFilter" class="w-full bg-transparent font-bold text-slate-700 outline-none cursor-pointer">
                    <option value="">සියලුම සමාගම්</option>
                    <option value="Ceypetco">Ceypetco</option>
                    <option value="LIOC">Lanka IOC</option>
                    <option value="Sinopec">Sinopec</option>
                </select>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">තොග පවතින සෙඩ්</label>
                <select id="stockFilter" class="w-full bg-transparent font-bold text-slate-700 outline-none cursor-pointer">
                    <option value="all">සියල්ල</option>
                    <option value="available">තොග පවතින පමනක්</option>
                </select>
            </div>
            <div class="bg-red-600 p-4 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase">සමස්ත පිරවුම්හල්</p>
                    <h3 id="totalStations" class="text-2xl font-black">0</h3>
                </div>
                <i data-lucide="database" class="opacity-50 w-8 h-8"></i>
            </div>
        </section>

        <div id="stationGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-white border-t py-10 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm">© 2026 FuelWise SL. All Rights Reserved.</p>
            <p class="text-slate-300 text-[10px] mt-2">Data updated every 5 minutes from official sources.</p>
        </div>
    </footer>

    <script>
        // --- DATASET: ලංකාවේ පවතින සෙඩ් ලැයිස්තුව (Data Sample for 1,600+ capability) ---
        const stations = [
            // Colombo District
            { id: 1, name: "Ceypetco - Colombo Fort", district: "Colombo", city: "Fort", company: "Ceypetco", phone: "0112323231", pumps: 12, stock: true, queue: "50m", lat: 6.9344, lng: 79.8428, address: "Janadhipathi Mawatha, Colombo 01" },
            { id: 2, name: "LIOC - Bambalapitiya", district: "Colombo", city: "Bambalapitiya", company: "LIOC", phone: "0112581234", pumps: 6, stock: true, queue: "No Queue", lat: 6.8910, lng: 79.8550, address: "Galle Road, Colombo 04" },
            { id: 3, name: "Sinopec - Nawala", district: "Colombo", city: "Nawala", company: "Sinopec", phone: "0112808080", pumps: 8, stock: true, queue: "20m", lat: 6.9030, lng: 79.8920, address: "Nawala Road, Rajagiriya" },
            
            // Kandy District
            { id: 4, name: "Ceypetco - Kandy Central", district: "Kandy", city: "Kandy Town", company: "Ceypetco", phone: "0812233441", pumps: 10, stock: false, queue: "N/A", lat: 7.2906, lng: 80.6337, address: "Dalada Veediya, Kandy" },
            
            // Galle District
            { id: 5, name: "LIOC - Galle Harbour", district: "Galle", city: "Galle Town", company: "LIOC", phone: "0912233445", pumps: 4, stock: true, queue: "100m", lat: 6.0329, lng: 80.2168, address: "Main Street, Galle" },
            
            // Anuradhapura
            { id: 6, name: "Ceypetco - Anuradhapura", district: "Anuradhapura", city: "New Town", company: "Ceypetco", phone: "0252222222", pumps: 8, stock: true, queue: "10m", lat: 8.3114, lng: 80.4037, address: "Anuradhapura New Town" },

            // Kurunegala
            { id: 7, name: "LIOC - Kurunegala Central", district: "Kurunegala", city: "Kurunegala", company: "LIOC", phone: "0372223456", pumps: 14, stock: true, queue: "300m", lat: 7.4863, lng: 80.3623, address: "Colombo Road, Kurunegala" },

            // Jaffna
            { id: 8, name: "Ceypetco - Jaffna Town", district: "Jaffna", city: "Jaffna", company: "Ceypetco", phone: "0212222222", pumps: 5, stock: true, queue: "No Queue", lat: 9.6615, lng: 80.0255, address: "Hospital Road, Jaffna" }
            
            // ඔබට මෙලෙස ඉතිරි සෙඩ් 1500+ ම මෙතනට ඇතුලත් කල හැකිය.
        ];

        const districts = ["Ampara","Anuradhapura","Badulla","Batticaloa","Colombo","Galle","Gampaha","Hambantota","Jaffna","Kalutara","Kandy","Kegalle","Kilinochchi","Kurunegala","Mannar","Matale","Matara","Monaragala","Mullaitivu","Nuwara Eliya","Polonnaruwa","Puttalam","Ratnapura","Trincomalee","Vavuniya"];

        let map, markers = [];

        function init() {
            lucide.createIcons();
            initMap();
            populateDistricts();
            renderStations(stations);

            // Listeners
            document.getElementById('globalSearch').addEventListener('input', filterStations);
            document.getElementById('districtFilter').addEventListener('change', filterStations);
            document.getElementById('companyFilter').addEventListener('change', filterStations);
            document.getElementById('stockFilter').addEventListener('change', filterStations);
        }

        function initMap() {
            map = L.map('map').setView([7.8731, 80.7718], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        function populateDistricts() {
            const select = document.getElementById('districtFilter');
            districts.sort().forEach(d => {
                select.innerHTML += `<option value="${d}">${d}</option>`;
            });
        }

        function renderStations(data) {
            const grid = document.getElementById('stationGrid');
            const totalLabel = document.getElementById('totalStations');
            grid.innerHTML = "";
            totalLabel.innerText = data.length;

            // Map Clear
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            data.forEach(s => {
                // Marker color
                const markerColor = s.company === 'Ceypetco' ? '#ef4444' : (s.company === 'LIOC' ? '#3b82f6' : '#10b981');
                
                const marker = L.circleMarker([s.lat, s.lng], {
                    radius: 8,
                    fillColor: markerColor,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup(`<b>${s.name}</b><br>${s.city}`);
                markers.push(marker);

                // Card Template
                const card = `
                    <div class="station-card bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-50 relative overflow-hidden">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${s.company === 'Ceypetco' ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}">
                                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-slate-800 leading-tight">${s.name}</h3>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${s.company} | ${s.district}</p>
                                </div>
                            </div>
                            <span class="flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full ${s.stock ? 'bg-green-400' : 'bg-red-400'} opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 ${s.stock ? 'bg-green-500' : 'bg-red-500'}"></span>
                            </span>
                        </div>

                        <div class="space-y-4 mb-8">
                            <div class="flex items-center gap-3 text-slate-600">
                                <i data-lucide="map-pin" class="w-4 h-4 text-slate-400"></i>
                                <span class="text-xs font-medium">${s.address}</span>
                            </div>
                            <div class="flex items-center gap-3 text-slate-600">
                                <i data-lucide="phone" class="w-4 h-4 text-slate-400"></i>
                                <span class="text-xs font-bold">${s.phone}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-slate-50 p-3 rounded-2xl">
                                    <p class="text-[9px] text-slate-400 font-bold uppercase">Active Pumps</p>
                                    <p class="text-sm font-black text-slate-700">${s.pumps}</p>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-2xl">
                                    <p class="text-[9px] text-slate-400 font-bold uppercase">Queue Length</p>
                                    <p class="text-sm font-black text-orange-600">${s.queue}</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="map.setView([${s.lat}, ${s.lng}], 15)" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl text-xs font-bold hover:bg-red-600 transition flex items-center justify-center gap-2">
                                <i data-lucide="navigation" class="w-4 h-4"></i> View Map
                            </button>
                            <a href="tel:${s.phone}" class="w-14 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center hover:bg-slate-200 transition">
                                <i data-lucide="phone-call" class="w-5 h-5"></i>
                            </a>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
            lucide.createIcons();
        }

        function filterStations() {
            const search = document.getElementById('globalSearch').value.toLowerCase();
            const district = document.getElementById('districtFilter').value;
            const company = document.getElementById('companyFilter').value;
            const stock = document.getElementById('stockFilter').value;

            const filtered = stations.filter(s => {
                const matchesSearch = s.name.toLowerCase().includes(search) || s.city.toLowerCase().includes(search) || s.phone.includes(search);
                const matchesDistrict = district === "" || s.district === district;
                const matchesCompany = company === "" || s.company === company;
                const matchesStock = stock === "all" || s.stock === true;

                return matchesSearch && matchesDistrict && matchesCompany && matchesStock;
            });

            renderStations(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
